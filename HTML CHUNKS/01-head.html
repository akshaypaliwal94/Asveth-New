<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Athletic Indian – Male VSL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a10;
    --accent: #f97316;
    --accent2: #fbbf24;
    --glow: rgba(249,115,22,0.35);
    --text: #f0f0f0;
    --muted: #8a8fa8;
    --border: rgba(255,255,255,0.07);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── BACKGROUND ── */
  .hero-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .hero-bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 75%);
  }
  .hero-bg::after {
    content: '';
    position: absolute;
    width: 700px; height: 500px;
    background: radial-gradient(circle, rgba(249,115,22,0.1) 0%, transparent 70%);
    top: -150px; left: 50%; transform: translateX(-50%);
  }

  /* ── WRAPPER ── */
  .outer-wrap {
    position: relative; z-index: 1;
    padding: 16px 16px 40px;
  }

  /* ── FRAME ── */
  .frame {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    border: 1px solid rgba(249,115,22,0.2);
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(249,115,22,0.03) 0%, transparent 40%);
    overflow: hidden;
    box-shadow: 0 0 60px rgba(249,115,22,0.06), 0 0 120px rgba(0,0,0,0.6);
    position: relative;
  }
  .frame::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(249,115,22,0.6), rgba(251,191,36,0.4), transparent);
  }

  /* ── TOP BAR ── */
  .top-bar {
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .logo-wrap { display: flex; align-items: center; gap: 9px; }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 14px var(--glow);
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 3px;
    background: linear-gradient(90deg, #f97316, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* ── HERO BODY ── */
  .hero-body {
    padding: 28px 28px 0;
    text-align: center;
  }

  /* pre-headline */
  .pre-headline {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.25);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease 0.1s both;
  }
  .pre-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* headline */
  .headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(30px, 5vw, 54px);
    line-height: 1.0;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 10px;
    animation: fadeUp 0.5s ease 0.2s both;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #f97316, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* subheadline */
  .subheadline {
    font-size: 14px; color: var(--muted);
    max-width: 520px; margin: 10px auto 18px;
    line-height: 1.65;
    animation: fadeUp 0.5s ease 0.3s both;
  }
  .subheadline strong { color: var(--accent2); font-weight: 700; }

  /* CTA */
  .cta-wrap {
    margin-bottom: 18px;
    animation: fadeUp 0.5s ease 0.4s both;
  }
  .cta-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(90deg, #f97316, #fb923c, #fbbf24);
    background-size: 200% auto;
    color: #000; font-family: 'Barlow', sans-serif;
    font-weight: 700; font-size: 15px; letter-spacing: 0.5px;
    padding: 15px 36px; border-radius: 100px; border: none;
    cursor: pointer; text-decoration: none;
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(249,115,22,0.5), 0 4px 20px rgba(0,0,0,0.4);
    animation: btnGlow 2.5s ease-in-out infinite;
  }
  .cta-btn:hover {
    background-position: right center;
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 0 50px rgba(249,115,22,0.7), 0 8px 30px rgba(0,0,0,0.5);
  }
  .cta-arrow {
    width: 20px; height: 20px; background: rgba(0,0,0,0.2);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }

  /* ── ARROWS + SOCIAL PROOF ROW ── */
  .proof-row {
    display: flex; align-items: center; justify-content: center;
    gap: 0; margin-bottom: 16px;
    animation: fadeUp 0.5s ease 0.5s both;
  }

  .arrow-svg {
    width: 56px; height: 46px;
    flex-shrink: 0;
    opacity: 0.8;
    filter: drop-shadow(0 0 5px rgba(249,115,22,0.45));
  }
  .arrow-right-flip { transform: scaleX(-1); }

  .social-proof {
    display: flex; align-items: center; gap: 10px;
    padding: 0 8px;
  }
  .avatars { display: flex; }
  .av {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--accent2);
    margin-left: -7px;
  }
  .av:first-child { margin-left: 0; }
  .av.a1 { background: linear-gradient(135deg, #7c3aed, #4c1d95); }
  .av.a2 { background: linear-gradient(135deg, #dc2626, #7f1d1d); }
  .av.a3 { background: linear-gradient(135deg, #059669, #064e3b); }
  .av.a4 { background: linear-gradient(135deg, #d97706, #78350f); }
  .av.a5 { background: linear-gradient(135deg, #374151, #1f2937); }
  .stars-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
  .stars { color: var(--accent2); font-size: 12px; letter-spacing: 1px; }
  .stars-label { font-size: 10.5px; color: var(--muted); }
  .proof-divider { width: 1px; height: 22px; background: var(--border); }
  .proof-text { font-size: 11.5px; color: var(--muted); }
  .proof-text strong { color: var(--text); }

  /* ── VIDEO ── */
  .video-wrap {
    padding: 0 16px 24px;
    animation: fadeUp 0.5s ease 0.6s both;
  }
  .video-outer-ring {
    border-radius: 22px;
    padding: 3px;
    background: linear-gradient(135deg, rgba(249,115,22,0.9), rgba(251,191,36,0.6), rgba(249,115,22,0.4));
    box-shadow:
      0 0 50px rgba(249,115,22,0.35),
      0 0 100px rgba(249,115,22,0.15),
      0 16px 56px rgba(0,0,0,0.7);
  }
  .video-container {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: #080a10;
  }
  .video-thumb-bg {
    position: absolute; inset: 0;
    background: #080a10;
  }
  .video-thumb-bg img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    position: absolute; inset: 0;
    filter: none;
  }
  .video-thumb-bg::before {
    content: '';
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, transparent 60%, rgba(8,10,16,0.4) 100%);
  }
  .video-overlay {
    position: absolute; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  .play-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow:
      0 0 0 14px rgba(255,255,255,0.12),
      0 0 0 30px rgba(255,255,255,0.05),
      0 6px 28px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: playPulse 2.5s ease-in-out infinite;
  }
  .play-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 0 18px rgba(255,255,255,0.16), 0 0 0 36px rgba(255,255,255,0.07);
  }
  .play-btn svg { margin-left: 5px; }
  .video-label {
    font-size: 11px; color: rgba(255,255,255,0.85);
    letter-spacing: 2px; text-transform: uppercase;
    text-shadow: 0 1px 10px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.4);
    padding: 5px 16px; border-radius: 100px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
  }


  /* ── BOTTOM BAR ── */
  .bottom-bar {
    display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 0;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
  }
  .check-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 600; color: var(--text);
    padding: 5px 18px;
    border-right: 1px solid var(--border);
  }
  .check-item:last-child { border-right: none; }
  .check-icon {
    width: 15px; height: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 8px; color: #000; font-weight: 900;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(249,115,22,0.5), 0 4px 20px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 0 50px rgba(249,115,22,0.8), 0 4px 20px rgba(0,0,0,0.4); }
  }
  @keyframes playPulse {
    0%, 100% { box-shadow: 0 0 0 10px rgba(249,115,22,0.12), 0 0 0 22px rgba(249,115,22,0.06); }
    50% { box-shadow: 0 0 0 14px rgba(249,115,22,0.18), 0 0 0 28px rgba(249,115,22,0.09); }
  }

  /* ── STRATEGY SECTION ── */
  .strategy-section {
    max-width: 900px;
    margin: 28px auto 0;
    padding: 0 16px 32px;
    position: relative; z-index: 1;
  }

  .section-eyebrow {
    text-align: center;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .section-headline {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.0;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 14px;
  }
  .section-headline span {
    display: block;
    background: linear-gradient(90deg, #f97316, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .section-sub {
    text-align: center;
    font-size: 14px; color: var(--muted);
    max-width: 480px; margin: 0 auto 32px;
    line-height: 1.6;
  }

  /* steps layout */
  .steps-wrap {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    position: relative;
  }

  /* left column: number + line */
  .step-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 80px;
    flex-shrink: 0;
    padding-top: 4px;
  }

  .step-num {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1.5px solid rgba(249,115,22,0.4);
    background: rgba(249,115,22,0.07);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 16px;
    color: var(--accent2);
    letter-spacing: 1px;
    position: relative; z-index: 2;
    box-shadow: 0 0 16px rgba(249,115,22,0.1);
    flex-shrink: 0;
  }

  /* vertical connecting line */
  .step-line {
    width: 1.5px;
    flex: 1;
    min-height: 32px;
    background: linear-gradient(180deg, rgba(249,115,22,0.35) 0%, rgba(249,115,22,0.1) 100%);
    margin: 0;
  }
  .step-row:last-child .step-line {
    display: none;
  }

  /* right column: card */
  .step-card {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 22px 26px 24px;
    margin-bottom: 24px;
    margin-left: 4px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s;
  }
  .step-card:hover {
    border-color: rgba(249,115,22,0.25);
    background: rgba(249,115,22,0.04);
  }
  .step-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(249,115,22,0.3), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .step-card:hover::before { opacity: 1; }

  .card-top {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .card-icon {
    font-size: 20px; line-height: 1;
    filter: drop-shadow(0 0 6px rgba(249,115,22,0.4));
  }
  .card-tag {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent);
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.2);
    padding: 3px 10px; border-radius: 4px;
  }

  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 22px;
    text-transform: uppercase;
    color: #fff; margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .card-body {
    font-size: 13.5px; color: var(--muted);
    line-height: 1.65; max-width: 580px;
  }
  .card-body strong { color: #c8ccd6; font-weight: 600; }

  /* section divider */
  .section-divider {
    max-width: 900px; margin: 0 auto;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(249,115,22,0.15), transparent);
  }

  /* ── SOCIAL PROOF CAROUSEL SECTION ── */
  .carousel-section {
    margin: 32px auto 0;
    padding: 0 0 40px;
    position: relative; z-index: 1;
    overflow: hidden;
  }

  .carousel-header {
    text-align: center;
    padding: 0 16px;
    margin-bottom: 28px;
  }
  .carousel-eyebrow {
    font-size: 13px; color: var(--muted);
    margin-bottom: 8px;
  }
  .carousel-eyebrow strong { color: var(--text); }
  .carousel-headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 4vw, 42px);
    text-transform: uppercase;
    color: #fff;
    line-height: 1.05;
  }

  /* scrollable track */
  .carousel-track-wrap {
    position: relative;
  }
  .carousel-track {
    display: flex;
    gap: 16px;
    padding: 8px 40px 16px;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
    cursor: grab;
    user-select: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-track.grabbing { cursor: grabbing; }

  /* fade edges */
  .carousel-track-wrap::before,
  .carousel-track-wrap::after {
    content: '';
    position: absolute; top: 0; bottom: 0; width: 60px;
    z-index: 2; pointer-events: none;
  }
  .carousel-track-wrap::before {
    left: 0;
    background: linear-gradient(90deg, var(--bg), transparent);
  }
  .carousel-track-wrap::after {
    right: 0;
    background: linear-gradient(270deg, var(--bg), transparent);
  }

  /* individual card */
  .c-card {
    flex-shrink: 0;
    width: 260px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: #0d1018;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .c-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(249,115,22,0.08);
  }

  /* VIDEO CARD */
  .c-card.video-card {
    height: 320px;
  }
  .c-card-media {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #111827 0%, #0d1018 100%);
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .c-card-media::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85) 100%);
  }
  .c-media-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.15; font-size: 48px;
  }
  .c-play-btn {
    position: absolute; z-index: 3;
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 8px rgba(249,115,22,0.15);
    animation: playPulse 2.5s ease-in-out infinite;
  }
  .c-play-btn svg { margin-left: 3px; }
  .c-card-footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 14px 16px; z-index: 4;
  }
  .c-card-tag {
    display: inline-block;
    font-size: 9px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    background: rgba(249,115,22,0.15);
    border: 1px solid rgba(249,115,22,0.3);
    color: var(--accent);
    padding: 2px 8px; border-radius: 4px;
    margin-bottom: 6px;
  }
  .c-card-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 17px;
    text-transform: uppercase; color: #fff;
    line-height: 1.2;
  }
  .c-card-sub {
    font-size: 11px; color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* BEFORE/AFTER CARD */
  .c-card.ba-card {
    height: 320px;
    width: 280px;
  }
  .c-ba-split {
    display: grid; grid-template-columns: 1fr 1fr;
    height: 240px; gap: 2px;
  }
  .c-ba-slot {
    position: relative;
    background: #111520;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .c-ba-slot.after { background: #1a1208; }
  .c-ba-slot-ph { opacity: 0.15; font-size: 32px; }
  .c-ba-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    text-align: center; padding: 5px 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; color: #fff;
    background: rgba(0,0,0,0.6);
  }
  .c-ba-slot.after .c-ba-label {
    background: linear-gradient(90deg, rgba(249,115,22,0.8), rgba(251,191,36,0.7));
    color: #000;
  }
  .c-ba-info {
    padding: 12px 16px;
  }
  .c-ba-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px; color: #fff;
    display: flex; align-items: center; justify-content: space-between;
  }
  .c-ba-stat {
    font-size: 11px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .c-ba-desc {
    font-size: 11px; color: var(--muted);
    line-height: 1.45; margin-top: 4px;
  }

  /* STAT CARD */
  .c-card.stat-card {
    height: 320px;
    width: 240px;
